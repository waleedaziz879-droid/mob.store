async function runSeed() {
  const btn = document.getElementById('seedBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Seeding...';
  logEl.innerHTML = '';

  log('🔌 Connecting to Supabase...', 'inf');

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY);

  log(`📡 Connected to: ${SUPABASE_URL}`, 'ok');
  log('', 'inf');

  // Check if table exists by trying a select
  log('🔍 Checking if products table exists...', 'inf');
  const { data: existing, error: checkErr } = await db.from('products').select('id').limit(1);

  if (checkErr && checkErr.code === '42P01') {
    log('⚠️  Table does not exist!', 'warn');
    log('', 'warn');
    log('══════════════════════════════════════════', 'warn');
    log('ACTION REQUIRED: Run schema.sql first!', 'warn');
    log('══════════════════════════════════════════', 'warn');
    log('', 'warn');
    log('1. Go to: https://supabase.com/dashboard/project/ujucxtgslqozntbvqgts/sql', 'warn');
    log('2. Open a New Query tab', 'warn');
    log('3. Paste the contents of schema.sql', 'warn');
    log('4. Click "Run"', 'warn');
    log('5. Come back here and click Seed again!', 'warn');
    btn.disabled = false;
    btn.textContent = '🚀 Seed Database Now';
    return;
  }

  if (checkErr) {
    log(`❌ Connection error: ${checkErr.message}`, 'err');
    log(`Code: ${checkErr.code}`, 'err');
    btn.disabled = false;
    btn.textContent = '🔁 Retry Seed';
    return;
  }

  if (existing && existing.length > 0) {
    log(`ℹ️  Table already has ${existing.length}+ rows. Will upsert (merge) all products.`, 'inf');
  } else {
    log('✅ Table is empty — fresh seed!', 'ok');
  }

  log('', 'inf');
  log(`📦 Seeding ${PRODUCTS.length} products...`, 'inf');
  log('', 'inf');

  let successCount = 0;
  for (const product of PRODUCTS) {
    const { error } = await db.from('products').upsert(product, { onConflict: 'id' });
    if (error) {
      log(`  ❌ FAILED: ${product.name} — ${error.message}`, 'err');
    } else {
      log(`  ✅ ${product.name} (${product.brand}) — $${product.price}`, 'ok');
      successCount++;
    }
  }

  log('', 'inf');
  log(`══════════════════════════════════════════`, successCount === PRODUCTS.length ? 'ok' : 'warn');
  log(`✅ Done! ${successCount}/${PRODUCTS.length} products seeded successfully.`, successCount === PRODUCTS.length ? 'ok' : 'warn');
  log(`══════════════════════════════════════════`, successCount === PRODUCTS.length ? 'ok' : 'warn');
  log('', 'ok');
  log('🛍️  Your store is ready! Visit:', 'ok');
  log('   https://waleedaziz879-droid.github.io/mob.store/', 'ok');
  log('🔐 Admin Panel:', 'ok');
  log('   https://waleedaziz879-droid.github.io/mob.store/admin.html', 'ok');

  btn.textContent = '✅ Seeded!';
}
