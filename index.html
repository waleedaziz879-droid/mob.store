<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Electra - Premium Mobile Store</title>
  <meta name="description" content="Explore and purchase premium flagship mobile devices. Compare specs, customize options, and experience next-level technology.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header / Navigation -->
  <header class="glass">
    <a href="#" class="logo" id="store-logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
        <line x1="12" y1="18" x2="12.01" y2="18"></line>
      </svg>
      ELECTRA
    </a>

    <!-- Live Search -->
    <div class="search-container">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" id="catalog-search" class="search-input" placeholder="Search flagships (e.g. iPhone, Galaxy)...">
    </div>

    <div class="nav-actions">
      <!-- Admin Panel Link -->
      <a href="admin.html" class="nav-btn" aria-label="Open Admin Dashboard" title="Admin Dashboard">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="9"></rect>
          <rect x="14" y="3" width="7" height="5"></rect>
          <rect x="14" y="12" width="7" height="9"></rect>
          <rect x="3" y="16" width="7" height="5"></rect>
        </svg>
      </a>

      <!-- Theme Switcher -->
      <button class="nav-btn" id="theme-toggle" aria-label="Toggle Dark Mode">
        <svg id="theme-moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <svg id="theme-sun-icon" style="display: none;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
      </button>

      <!-- Cart Trigger -->
      <button class="nav-btn" id="cart-trigger" aria-label="Open Shopping Cart">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"></circle>
          <circle cx="20" cy="21" r="1"></circle>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
        <span class="nav-badge" id="cart-badge-count">0</span>
      </button>
    </div>
  </header>

  <!-- Hero Flagship Showcase -->
  <section class="hero" id="hero-showcase">
    <div class="hero-slider" id="hero-slider-container">
      <!-- Slides will be loaded dynamically by main.js -->
      <div class="slider-controls" id="hero-slider-dots"></div>
    </div>
  </section>

  <!-- Main Store Layout -->
  <main class="store-container">
    <!-- Sidebar Filters -->
    <aside class="filters-sidebar">
      <!-- Brand Filter -->
      <div class="filter-group">
        <h3 class="filter-title">Brand</h3>
        <button class="brand-btn active" data-brand="All" id="filter-brand-all">
          All Brands <span>&rarr;</span>
        </button>
        <button class="brand-btn" data-brand="Apple" id="filter-brand-apple">
          Apple <span>&rarr;</span>
        </button>
        <button class="brand-btn" data-brand="Samsung" id="filter-brand-samsung">
          Samsung <span>&rarr;</span>
        </button>
        <button class="brand-btn" data-brand="Google" id="filter-brand-google">
          Google <span>&rarr;</span>
        </button>
        <button class="brand-btn" data-brand="OnePlus" id="filter-brand-oneplus">
          OnePlus <span>&rarr;</span>
        </button>
        <button class="brand-btn" data-brand="Xiaomi" id="filter-brand-xiaomi">
          Xiaomi <span>&rarr;</span>
        </button>
        <button class="brand-btn" data-brand="Sony" id="filter-brand-sony">
          Sony <span>&rarr;</span>
        </button>
      </div>

      <!-- Price Filter -->
      <div class="filter-group">
        <h3 class="filter-title">Price Range</h3>
        <div class="range-inputs">
          <input type="number" id="price-min" class="price-box" placeholder="Min" value="0" min="0">
          <span>-</span>
          <input type="number" id="price-max" class="price-box" placeholder="Max" value="1500" min="0">
        </div>
        <input type="range" id="price-slider" class="range-slider" min="0" max="1500" step="50" value="1500">
      </div>
    </aside>

    <!-- Product Grid Catalogue -->
    <section class="catalog-section">
      <div class="catalog-header">
        <p id="results-count-text">Showing all products</p>
        <div style="display: flex; gap: 0.5rem; align-items: center;">
          <label for="sort-select" style="font-size: 0.9rem; color: var(--text-secondary);">Sort by:</label>
          <select id="sort-select" class="sort-select">
            <option value="featured">Featured</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
            <option value="rating">Top Rated</option>
          </select>
        </div>
      </div>

      <div class="products-grid" id="catalog-products-grid">
        <!-- Products injected by main.js -->
      </div>
    </section>
  </main>

  <!-- Floating Comparison Bar -->
  <div class="comparison-bar glass" id="compare-bar">
    <div class="comparison-slots" id="compare-slots-container">
      <!-- Slot item templates will be injected here -->
    </div>
    <button class="glow-btn comp-action-btn" id="compare-now-btn">
      Compare Now (<span id="compare-count-text">0</span>/3)
    </button>
  </div>

  <!-- Shopping Cart Drawer Overlay -->
  <div class="drawer-overlay" id="cart-drawer-overlay">
    <div class="drawer">
      <div class="drawer-header">
        <h2>Your Cart</h2>
        <button class="drawer-close" id="cart-drawer-close" aria-label="Close Cart">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="drawer-items" id="cart-drawer-items">
        <!-- Cart Items loaded from localStorage -->
      </div>
      <div class="drawer-footer">
        <div class="cart-totals">
          <span>Subtotal:</span>
          <span id="cart-subtotal-val">$0.00</span>
        </div>
        <button class="glow-btn checkout-btn" id="checkout-trigger-btn">Proceed to Checkout</button>
      </div>
    </div>
  </div>

  <!-- Product Details Modal Overlay -->
  <div class="modal-overlay" id="details-modal-overlay">
    <div class="modal">
      <button class="modal-close-btn" id="details-modal-close" aria-label="Close details">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
      <div class="modal-grid" id="details-modal-content">
        <!-- Rendered detail view -->
      </div>
    </div>
  </div>

  <!-- Spec Comparison Modal Overlay -->
  <div class="modal-overlay" id="compare-modal-overlay">
    <div class="modal" style="width: 1000px;">
      <button class="modal-close-btn" id="compare-modal-close" aria-label="Close Comparison">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
      <div class="compare-modal-content" id="compare-modal-grid-wrapper">
        <!-- Dynamic comparison grid -->
      </div>
    </div>
  </div>

  <!-- Checkout Drawer/Modal Overlay -->
  <div class="modal-overlay" id="checkout-modal-overlay">
    <div class="modal" style="width: 800px;" id="checkout-modal">
      <button class="modal-close-btn" id="checkout-modal-close" aria-label="Close Checkout">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
      <div id="checkout-modal-body">
        <!-- Injected checkout form or success view -->
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Supabase & Configuration -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>

  <!-- JS Modules -->
  <script src="app.js"></script>
</body>
</html>
